name: Python CI (Windows)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Create virtual environment
      run: |
        python -m venv venv

    - name: Install dependencies
      run: |
        venv\Scripts\pip install --upgrade pip
        venv\Scripts\pip install -r requirements.txt

    - name: Check dependencies
      run: |
        venv\Scripts\pip check

    - name: Run security audit
      run: |
        venv\Scripts\pip install pip-audit
        venv\Scripts\pip-audit -r requirements.txt
      continue-on-error: true

    - name: Try to fix vulnerabilities
      run: |
        venv\Scripts\pip-audit --fix -r requirements.txt

    - name: Re-check after fix
      run: |
        venv\Scripts\pip check